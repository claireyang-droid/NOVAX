<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工班管理系統｜車用尿素加注設備</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Iansui&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgenjs.bundle.js"></script>
<!-- Firebase（團隊共用資料同步） -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#EEF2F3;
  --surface:#FFFFFF;
  --surface-alt:#E4EAEC;
  --ink:#152634;
  --ink-soft:#5B6E7C;
  --ink-faint:#8B9BA7;
  --primary:#1D4E5F;
  --primary-dark:#0F323E;
  --primary-tint:#DCE9EB;
  --accent:#E2A33D;
  --accent-tint:#FBEED9;
  --danger:#C1473A;
  --danger-tint:#F7E0DD;
  --warn:#D98F2B;
  --warn-tint:#FBEBD3;
  --success:#3F8F5F;
  --success-tint:#DFEEE3;
  --neutral:#7A8B98;
  --neutral-tint:#E7EBEE;
  --border:#DCE3E6;
  --radius:10px;
  --shadow:0 1px 2px rgba(21,38,52,.06), 0 4px 14px rgba(21,38,52,.06);
  --font-display:'Iansui', system-ui, sans-serif;
  --font-mono:'IBM Plex Mono', ui-monospace, monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-display);
  font-size:14px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;
  text-size-adjust:100%;
}
.cell-plain{font-size:13px;color:var(--ink);}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:14px;}
::selection{background:var(--accent-tint);}

/* ---------- Layout ---------- */
#app{min-height:100vh;display:flex;flex-direction:column;}

.topbar{
  background:linear-gradient(135deg,var(--primary-dark) 0%, var(--primary) 100%);
  color:#fff;
  padding:22px 24px 20px;
  position:relative;
  overflow:hidden;
}
.topbar::after{
  content:"";
  position:absolute;
  right:-40px;top:-60px;
  width:220px;height:220px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%, rgba(226,163,61,.35), transparent 70%);
}
.topbar-inner{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;}
.brand-eyebrow{
  font-family:var(--font-mono);
  font-size:11px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--accent);
  margin:0 0 6px;
  font-weight:600;
}
.brand-title{font-size:22px;font-weight:900;margin:0;letter-spacing:.01em;}
.brand-sub{font-size:12.5px;color:rgba(255,255,255,.72);margin:4px 0 0;}
.sync-pill{
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.18);
  padding:6px 12px;border-radius:999px;
  font-size:12px;color:rgba(255,255,255,.85);
  white-space:nowrap;
}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#6FD79A;box-shadow:0 0 0 3px rgba(111,215,154,.25);}
.sync-dot.busy{background:var(--accent);box-shadow:0 0 0 3px rgba(226,163,61,.25);}

.tabs{
  display:flex;gap:2px;
  background:var(--primary-dark);
  padding:0 24px;
  overflow-x:auto;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{
  background:transparent;border:none;
  color:rgba(255,255,255,.62);
  padding:12px 16px 11px;
  font-size:13.5px;font-weight:600;
  border-bottom:3px solid transparent;
  white-space:nowrap;
  display:flex;align-items:center;gap:7px;
  transition:color .15s;
}
.tab-btn .tab-ico{font-size:15px;}
.tab-btn:hover{color:#fff;}
.tab-btn.active{color:#fff;border-bottom-color:var(--accent);}

main{flex:1;max-width:1180px;width:100%;margin:0 auto;padding:22px 20px 60px;}

/* ---------- Cards / Stats ---------- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:22px;}
.stat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 18px;box-shadow:var(--shadow);
  display:flex;flex-direction:column;gap:6px;
  position:relative;
}
.stat-label{font-size:12px;color:var(--ink-soft);font-weight:600;display:flex;align-items:center;gap:6px;}
.stat-value{font-family:var(--font-mono);font-size:28px;font-weight:600;color:var(--ink);}
.stat-value small{font-size:13px;color:var(--ink-faint);font-weight:500;}
.stat-foot{font-size:11.5px;color:var(--ink-faint);}

/* tank-fill gauge, signature element */
.tank-gauge{
  width:26px;height:38px;border:2px solid var(--primary);border-radius:4px 4px 6px 6px;
  position:relative;overflow:hidden;background:var(--surface-alt);flex-shrink:0;
}
.tank-gauge::before{
  content:"";position:absolute;left:0;right:0;bottom:0;
  height:var(--fill,50%);
  background:linear-gradient(180deg, #63b98a, var(--success));
  transition:height .5s ease;
}
.tank-gauge::after{
  content:"";position:absolute;left:2px;right:2px;top:3px;height:2px;background:rgba(255,255,255,.5);
}

.section-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:28px 0 12px;flex-wrap:wrap;}
.section-head h2{font-size:16px;margin:0;font-weight:700;}
.section-head .hint{font-size:12px;color:var(--ink-faint);}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.panel-toolbar{display:flex;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;background:var(--surface);}
.search-input{
  flex:1;min-width:160px;
  border:1px solid var(--border);border-radius:8px;padding:8px 12px;
  background:var(--bg);
}
.search-input:focus{outline:2px solid var(--primary-tint);border-color:var(--primary);}
.filter-select{border:1px solid var(--border);border-radius:8px;padding:8px 10px;background:var(--bg);}
.btn{
  border:1px solid transparent;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;
  display:inline-flex;align-items:center;gap:6px;transition:transform .1s, box-shadow .15s;
}
.btn:active{transform:translateY(1px);}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-ghost{background:var(--surface);border-color:var(--border);color:var(--ink);}
.btn-ghost:hover{background:var(--surface-alt);}
.btn-danger{background:var(--danger-tint);color:var(--danger);}
.btn-danger:hover{background:#f0c9c3;}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px;}
.btn-icon-only{padding:6px 8px;}

/* ---------- Table ---------- */
.table-wrap{overflow-x:auto;}
.pagination-bar{
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;
  padding:12px 16px;border-top:1px solid var(--border);
  font-size:12.5px;color:var(--ink-soft);
}
.pagination-bar select{border:1px solid var(--border);border-radius:8px;padding:6px 8px;background:var(--bg);font-size:12.5px;}
.pagination-nav{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.pagination-nav .hint{font-size:12.5px;color:var(--ink-soft);white-space:nowrap;}
.pagination-nav button:disabled{opacity:.45;cursor:default;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{
  text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;
  color:var(--ink-soft);font-weight:700;
  padding:10px 14px;border-bottom:1px solid var(--border);
  background:var(--surface-alt);white-space:nowrap;
}
tbody td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:top;white-space:nowrap;}
tbody td .cell-main, tbody td .cell-sub, tbody td .cell-mono{white-space:nowrap;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:#F7F9FA;}

/* ---------- 保固／收款統計表（維修品項統計頁）專用美化樣式 ---------- */
.warranty-stats-table table{border:1px solid var(--border);border-radius:10px;}
.warranty-stats-table td, .warranty-stats-table th{text-align:right;}
.warranty-stats-table td:first-child, .warranty-stats-table th:first-child{text-align:left;background:var(--surface);}
.warranty-stats-table thead th:first-child{background:var(--surface-alt);}
.warranty-stats-table .grp-divider{border-left:2px solid var(--border);}
.warranty-stats-table .col-tint-in{background:#F2F8F4;}
.warranty-stats-table thead .col-tint-in{background:var(--success-tint);color:var(--success);}
.warranty-stats-table .col-tint-out{background:#FBF6EE;}
.warranty-stats-table thead .col-tint-out{background:var(--warn-tint);color:var(--warn);}
.warranty-stats-table tbody tr.row-total td{background:var(--surface-alt);font-weight:700;}
.warranty-stats-table tbody tr.row-total td.col-tint-in{background:#E4F1E8;}
.warranty-stats-table tbody tr.row-total td.col-tint-out{background:#F5ECDA;}
.warranty-stats-table tbody tr.row-spacer td{border:none;padding:5px 0;background:transparent;}
.warranty-stats-table tbody tr:hover td{background:#EEF4F5;}
.warranty-stats-table tbody tr:hover td.col-tint-in{background:#E1EFE6;}
.warranty-stats-table tbody tr:hover td.col-tint-out{background:#F2E9D6;}
.warranty-stats-table .amt-pill{display:inline-block;min-width:64px;padding:3px 12px;border-radius:999px;font-weight:700;font-family:var(--font-mono);font-size:12px;}
.warranty-stats-table .amt-pill.zero{background:var(--neutral-tint);color:var(--ink-faint);font-weight:500;}
.warranty-stats-table .amt-pill.paid{background:var(--success);color:#fff;}
.warranty-stats-table .amt-pill.unpaid{background:var(--warn);color:#fff;}
.warranty-stats-table .amt-pill.total{background:var(--primary);color:#fff;}
.warranty-stats-table .pct-tag{font-size:11px;color:var(--ink-faint);font-family:var(--font-mono);}
.cell-main{font-weight:600;color:var(--ink);}
.cell-sub{color:var(--ink-faint);font-size:12px;margin-top:2px;}
.cell-mono{font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);}
.cell-mono.cell-main{font-size:13px;color:var(--ink);}
.cell-wrap{white-space:normal;word-break:break-word;overflow-wrap:anywhere;max-width:200px;display:inline-block;}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;}
.tag-chip{display:inline-flex;align-items:center;padding:2px 9px;border-radius:6px;background:var(--neutral-tint);border:1px solid var(--border);color:var(--ink);font-size:12px;font-weight:500;white-space:nowrap;line-height:1.6;}
.row-actions{display:flex;gap:6px;white-space:nowrap;}
.empty-state{padding:48px 20px;text-align:center;color:var(--ink-faint);}
.empty-state .emoji{font-size:30px;display:block;margin-bottom:8px;}

/* badges */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;white-space:nowrap;
}
.badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;}
.badge-red{background:var(--danger-tint);color:var(--danger);}
.badge-amber{background:var(--warn-tint);color:var(--warn);}
.badge-green{background:var(--success-tint);color:var(--success);}
.badge-purple{background:#EBE3F5;color:#7148A6;}
.badge-grey{background:var(--neutral-tint);color:var(--neutral);}

/* inline status select (可直接於主列表切換狀態) */
.status-select{
  border:1px solid transparent;border-radius:999px;
  padding:5px 24px 5px 10px;font-size:12px;font-weight:700;
  font-family:inherit;cursor:pointer;
  appearance:none;-webkit-appearance:none;-moz-appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M1 3l4 4 4-4' fill='none' stroke='%235B6E7C' stroke-width='1.4'/></svg>");
  background-repeat:no-repeat;background-position:right 8px center;background-size:9px;
}
.status-select:focus{outline:2px solid var(--primary-tint);}
.status-select-red{background-color:var(--danger-tint);color:var(--danger);}
.status-select-amber{background-color:var(--warn-tint);color:var(--warn);}
.status-select-green{background-color:var(--success-tint);color:var(--success);}
.status-select-purple{background-color:#EBE3F5;color:#7148A6;}
.status-select-grey{background-color:var(--neutral-tint);color:var(--neutral);}

/* ---------- 管理維護 tab ---------- */
.settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;}
.settings-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:18px;display:flex;flex-direction:column;gap:10px;
}
.settings-card .sc-icon{font-size:22px;}
.settings-card .sc-title{font-size:14.5px;font-weight:700;color:var(--ink);}
.settings-card .sc-desc{font-size:12px;color:var(--ink-faint);flex:1;}
.settings-card .sc-count{font-family:var(--font-mono);font-size:11.5px;color:var(--ink-soft);}

/* ---------- Modal ---------- */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(15,26,33,.5);
  display:flex;align-items:flex-start;justify-content:center;
  padding:5vh 16px;overflow-y:auto;z-index:100;
  animation:fadeIn .15s ease;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{
  background:var(--surface);border-radius:14px;width:100%;max-width:560px;
  box-shadow:0 20px 60px rgba(15,26,33,.35);
  animation:slideUp .18s ease;
}
@keyframes slideUp{from{transform:translateY(10px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--border);}
.modal-head h3{margin:0;font-size:16px;}
.modal-close{background:none;border:none;font-size:18px;color:var(--ink-faint);padding:4px 8px;border-radius:6px;}
.modal-close:hover{background:var(--surface-alt);color:var(--ink);}
.modal-body{padding:18px 20px;max-height:64vh;overflow-y:auto;}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:16px 20px;border-top:1px solid var(--border);}

.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field.full{grid-column:1/-1;}
.field label{font-size:12px;font-weight:700;color:var(--ink-soft);}
.field input,.field select,.field textarea{
  border:1px solid var(--border);border-radius:8px;padding:9px 11px;background:var(--bg);color:var(--ink);width:100%;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-tint);}
.field textarea{resize:vertical;min-height:56px;}
.repair-items-wrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.repair-items-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.repair-items-table th{background:var(--surface-alt);text-align:left;padding:7px 8px;font-weight:600;color:var(--ink-soft);}
.repair-items-table td{padding:6px 8px;border-top:1px solid var(--border);vertical-align:middle;}
.repair-items-table input[type="number"], .repair-items-table input[type="text"]{padding:4px 6px;font-size:12.5px;border:1px solid var(--border);border-radius:6px;}
.repair-items-table input[type="checkbox"]{width:16px;height:16px;}
.ri-bill-select{padding:4px 6px;font-size:12.5px;border:1px solid var(--border);border-radius:6px;background:var(--bg);}
.repair-items-total{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface-alt);font-size:13px;}
.repair-items-detail{display:flex;flex-direction:column;gap:4px;}
.repair-items-detail-row{display:grid;grid-template-columns:1fr auto auto;gap:14px;font-size:13px;}
.checkbox-row{display:flex;flex-wrap:wrap;gap:8px 14px;padding-top:2px;}
.checkbox-row label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;flex:0 0 auto;}
.checkbox-row input[type="checkbox"]{flex:0 0 auto;}

/* 統一自訂 checkbox 外觀：避免部分行動瀏覽器（如 iOS Safari）用原生大尺寸方框渲染，跟旁邊文字重疊 */
input[type="checkbox"]{
  -webkit-appearance:none;-moz-appearance:none;appearance:none;
  width:18px;height:18px;min-width:18px;min-height:18px;
  border:1.5px solid var(--ink-faint);border-radius:5px;
  background:var(--surface);
  position:relative;margin:0;padding:0;
  cursor:pointer;vertical-align:middle;flex-shrink:0;
  box-sizing:border-box;
}
input[type="checkbox"]:checked{background:var(--primary);border-color:var(--primary);}
input[type="checkbox"]:checked::after{
  content:"";position:absolute;left:5px;top:1px;
  width:5px;height:10px;
  border:solid #fff;border-width:0 2px 2px 0;
  transform:rotate(45deg);
}
input[type="checkbox"]:focus-visible{outline:2px solid var(--primary-tint);outline-offset:1px;}
.repair-items-table input[type="checkbox"]{width:16px;height:16px;min-width:16px;min-height:16px;}
.repair-items-table input[type="checkbox"]:checked::after{left:4px;top:0px;width:4px;height:9px;}

.list-mgr-rows{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow-y:auto;}
.list-mgr-row{display:flex;gap:8px;align-items:center;}
.list-mgr-row input{flex:1;border:1px solid var(--border);border-radius:8px;padding:8px 12px;background:var(--bg);}
.list-mgr-add{display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.list-mgr-add input{flex:1;border:1px solid var(--border);border-radius:8px;padding:8px 12px;background:var(--bg);}

/* ---------- Repair item catalog manager ---------- */
.ric-rows{display:flex;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto;}
.ric-row{display:grid;grid-template-columns:1.5fr .8fr .8fr auto;gap:8px;align-items:center;}
.ric-row input, .ric-add input{border:1px solid var(--border);border-radius:8px;padding:8px 10px;background:var(--bg);width:100%;}
.ric-add{display:grid;grid-template-columns:1.5fr .8fr .8fr auto;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
@media (max-width:560px){.ric-row,.ric-add{grid-template-columns:1fr 1fr;}}

/* ---------- Pie chart (維修品項統計) ---------- */
.pie-panel{display:flex;gap:26px;padding:20px;align-items:center;flex-wrap:wrap;}
.pie-chart{width:180px;height:180px;min-width:180px;border-radius:50%;box-shadow:inset 0 0 0 1px var(--border);}
.pie-legend{display:flex;flex-direction:column;gap:7px;flex:1;min-width:220px;}
.pie-legend-row{display:flex;align-items:center;gap:8px;font-size:12.5px;}
.pie-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.pie-legend-name{flex:1;font-weight:600;color:var(--ink);}
.pie-legend-val{color:var(--ink-soft);font-family:var(--font-mono);font-size:11.5px;white-space:nowrap;}

/* ---------- Toast ---------- */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center;}
.toast-item{
  background:var(--primary-dark);color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;font-weight:600;
  box-shadow:0 8px 20px rgba(0,0,0,.2);
  animation:toastIn .18s ease;
  display:flex;align-items:center;gap:8px;
}
.toast-item.err{background:var(--danger);}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ---------- Schedule grid ---------- */
.week-block{margin-bottom:20px;}
.week-title{font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);margin-bottom:8px;font-weight:600;}
.sched-table td, .sched-table th{min-width:120px;}
.sched-cell{
  border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:12.5px;background:var(--bg);
  min-height:38px;cursor:text;
}
.sched-cell:hover{border-color:var(--primary);background:#fff;}
.sched-cell.empty{color:var(--ink-faint);}
.sched-worker{font-weight:700;color:var(--primary-dark);white-space:nowrap;}

/* ---------- Overview two-col ---------- */
.overview-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;}
@media (max-width:820px){.overview-grid{grid-template-columns:1fr;}}
.mini-list{display:flex;flex-direction:column;}
.mini-row{display:flex;justify-content:space-between;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);align-items:flex-start;}
.mini-row:last-child{border-bottom:none;}
.mini-row .t{font-weight:600;font-size:13px;}
.mini-row .s{font-size:11.5px;color:var(--ink-faint);margin-top:2px;}
.panel-title-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);}
.panel-title-row h3{margin:0;font-size:14px;font-weight:700;}
.link-btn{background:none;border:none;color:var(--primary);font-size:12px;font-weight:700;}

footer.app-footer{text-align:center;padding:20px;color:var(--ink-faint);font-size:11.5px;}

/* ---------- Import (Excel) ---------- */
.import-modal{max-width:720px;}
.import-drop{
  border:2px dashed var(--border);border-radius:10px;padding:26px;text-align:center;color:var(--ink-soft);
  background:var(--bg);cursor:pointer;transition:border-color .15s,background .15s;
}
.import-drop:hover{border-color:var(--primary);background:var(--primary-tint);}
.import-drop .emoji{font-size:26px;display:block;margin-bottom:8px;}
.map-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:4px;}
.map-table th{text-align:left;padding:8px 10px;color:var(--ink-soft);font-size:11px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);}
.map-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
.map-table select{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:#fff;}
.map-src{font-weight:700;color:var(--ink);}
.map-sample{color:var(--ink-faint);font-size:11.5px;margin-top:2px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.map-status{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap;}
.map-status.ok{background:var(--success-tint);color:var(--success);}
.map-status.skip{background:var(--neutral-tint);color:var(--neutral);}
.import-summary{display:flex;gap:16px;padding:12px 0;font-size:12.5px;color:var(--ink-soft);flex-wrap:wrap;}
.import-summary b{color:var(--ink);}
.sheet-tabs{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 4px;}
.sheet-tab{border:1px solid var(--border);background:var(--bg);border-radius:999px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--ink-soft);}
.sheet-tab.active{background:var(--primary);border-color:var(--primary);color:#fff;}

/* ---------- Detail view ---------- */
tr.row-clickable{cursor:pointer;}
.detail-list{display:flex;flex-direction:column;}
.detail-row{display:grid;grid-template-columns:150px 1fr;gap:14px;padding:11px 0;border-bottom:1px solid var(--border);}
.detail-row:last-child{border-bottom:none;}
.detail-label{font-size:12px;font-weight:700;color:var(--ink-soft);padding-top:1px;}
.detail-value{font-size:13.5px;color:var(--ink);word-break:break-word;}
.detail-empty{color:var(--ink-faint);}
@media (max-width:520px){.detail-row{grid-template-columns:1fr;gap:3px;}}

@media (max-width:600px){
  .field-grid{grid-template-columns:1fr;}
  .topbar{padding:18px 16px;}
  main{padding:16px 12px 50px;}
}
</style>

const db = firebase.firestore();
const FS_COLLECTION = 'novax_data'; // Firestore 集合名稱，可自行更改

async function storeGet(key){
  try{
    const snap = await db.collection(FS_COLLECTION).doc(key).get();
    if(!snap.exists) return null;
    const data = snap.data();
    return (data && typeof data.value === 'string') ? JSON.parse(data.value) : null;
  }catch(e){ console.error('storage get failed', e); return null; }
}
async function storeSet(key, val){
  setSyncing(true);
  try{
    await db.collection(FS_COLLECTION).doc(key).set({
      value: JSON.stringify(val),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  }catch(e){ console.error('storage set failed', e); showToast('儲存失敗，請重試','err'); }
  finally{ setSyncing(false); }
}

/* ============ Utilities ============ */
function esc(v){
  if(v===null||v===undefined) return '';
  return String(v).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function truncate(s, n){ s = String(s||''); return s.length>n ? s.slice(0,n)+'…' : s; }

/* station-id fields always display wrapped in parentheses, e.g. (GAS-0602) */
const STATION_ID_FIELDS = ['貨品序號','station_id','站點編號'];
function fmtStationId(v){
  const s = String(v==null?'':v).trim();
  if(!s) return '';
  return (s.startsWith('(') && s.endsWith(')')) ? s : `(${s})`;
}

function statusTone(status){
  const s = (status||'').trim();
  if(!s) return 'grey';
  if(s.startsWith('轉')) return 'purple';
  if(['待修','未清洗','未處理','借出中','逾期未還'].includes(s)) return 'red';
  if(['維修中','已出單','清洗中'].includes(s)) return 'amber';
  if(['已完修','已清洗','已歸還'].includes(s)) return 'green';
  return 'grey';
}
function badge(status, fallbackLabel){
  const label = status && String(status).trim() ? status : (fallbackLabel || '未設定');
  const tone = statusTone(status);
  return `<span class="badge badge-${tone}">${esc(label)}</span>`;
}

/* inline, in-table status dropdown — lets the user change status without opening the row */
function renderStatusSelect(moduleKey, id, current, options){
  const opts = options || [];
  const tone = statusTone(current);
  const cur = current || '';
  const extraOpt = (cur && !opts.includes(cur)) ? `<option value="${esc(cur)}" selected>${esc(cur)}</option>` : '';
  return `<select class="status-select status-select-${tone}" onclick="event.stopPropagation()"
    onchange="event.stopPropagation();app.quickSetStatus('${moduleKey}','${id}', this.value)">
    <option value="" ${!cur?'selected':''}>未設定</option>
    ${opts.map(o=>`<option value="${esc(o)}" ${cur===o?'selected':''}>${esc(o)}</option>`).join('')}
    ${extraOpt}
  </select>`;
}

async function quickSetStatus(moduleKey, id, value){
  const cfg = MODULES[moduleKey];
  const field = cfg.statusField;
  if(!field) return;
  const idx = state[moduleKey].findIndex(r=>r.id===id);
  if(idx<0) return;
  state[moduleKey][idx][field] = value;
  renderContent();
  await persist(moduleKey);
  showToast('已更新狀態');
}

function showToast(msg, kind){
  const root = document.getElementById('toast');
  const el = document.createElement('div');
  el.className = 'toast-item' + (kind==='err' ? ' err' : '');
  el.textContent = msg;
  root.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .25s'; setTimeout(()=>el.remove(),250); }, 2200);
}

function fmtDate(d){
  if(!d) return '';
  return String(d).slice(0,10);
}
function todayISO(){
  const d = new Date();
  return d.toISOString().slice(0,10);
}
function tomorrowISO(){
  const d = new Date();
  d.setDate(d.getDate()+1);
  return d.toISOString().slice(0,10);
}
/* 「維修人員1名稱」欄位現在可能是陣列（多選最多2位）或舊資料的純文字，統一轉成顯示用文字 */
function engineerListText(val){
  if(Array.isArray(val)) return val.filter(Boolean).join('、');
  return (val||'').toString();
}
/* 依「派修日期」跟今天／明天比對，回傳好讀的相對標籤（今日派修／明日派修／實際日期） */
function dispatchDayLabel(dateStr){
  const d = fmtDate(dateStr);
  if(!d) return '尚未設定日期';
  if(d===todayISO()) return '今日派修';
  if(d===tomorrowISO()) return '明日派修';
  return d + ' 派修';
}

/* generic search across an object's string values */
function matchesSearch(obj, q){
  if(!q) return true;
  const needle = q.trim().toLowerCase();
  if(!needle) return true;
  return Object.values(obj).some(v => v!==null && v!==undefined && String(v).toLowerCase().includes(needle));
}

function clearStatsRange(){

  renderContent();

function computeRepairStats(){
  const range = state.repairsStatsRange;
  const filtered = state.repairs.filter(r=>{
    if(!range.from && !range.to) return true;
    const d = getRepairDate(r);
    if(!d) return false;
    if(range.from && d < range.from) return false;
    if(range.to && d > range.to) return false;
    return true;
  });
  const agg = {};
  filtered.forEach(r=>{
    (Array.isArray(r['維修項目'])?r['維修項目']:[]).forEach(it=>{
      if(!agg[it.name]) agg[it.name] = { count:0, qtySum:0, amountSum:0, unit:it.unit };
      agg[it.name].count += 1;
      agg[it.name].qtySum += (it.qty||0);
      if(it.billable!==false) agg[it.name].amountSum += (it.subtotal || ((it.qty||0)*(it.unitPrice||0)) || 0);
    });
  });
  const rows = Object.entries(agg).sort((a,b)=>b[1].count-a[1].count);
  const totalAmount = rows.reduce((s,[,v])=>s+v.amountSum,0);
  return { filtered, rows, totalAmount };
}

/* ============ 部件保固自動判斷（更換品項後自動啟動 1 年保固） ============ */
/* 站點識別：優先用「貨品序號」(設備/站點序號)，若無則退回使用客戶名稱，
   確保同一站點在不同工單之間可以互相比對「這個品項上次是什麼時候換的」 */
function stationKeyOf(r){
  const sid = fmtStationId(r['貨品序號']||'');
  if(sid) return 'SID:'+sid;
  return 'NAME:'+String(r['客戶名稱']||'').trim();
}

function addYearsISO(dateStr, n){
  if(!dateStr) return '';
  const d = new Date(dateStr+'T00:00:00');
  if(isNaN(d.getTime())) return '';
  d.setFullYear(d.getFullYear()+n);
  return d.toISOString().slice(0,10);
}

/* 建立「站點 × 品項」的更換歷程（只計入勾選自維修項目目錄的品項，不含「其他」自訂項目） */
function buildPartReplacementLog(){
  const log = {};
  state.repairs.forEach(r=>{
    const items = Array.isArray(r['維修項目']) ? r['維修項目'] : [];
    if(!items.length) return;
    const date = getRepairDate(r);
    if(!date) return;
    const key = stationKeyOf(r);
    items.forEach(it=>{
      if(it.isOther) return;
      if(!log[key]) log[key] = {};
      if(!log[key][it.name]) log[key][it.name] = [];
      log[key][it.name].push({ date, id:r.id });
    });
  });
  Object.values(log).forEach(byName=>{
    Object.values(byName).forEach(arr=>arr.sort((a,b)=>a.date.localeCompare(b.date)));
  });
  return log;
}

/* 查詢「某站點的某品項」在指定日期(atDate)當下的部件保固狀態：
   找出 atDate 之前最近一次更換紀錄（排除自己 excludeId），
   若距離上次更換未滿 1 年，即自動視為「部件保固內」（這次維修理論上該品項免費更換） */
function partWarrantyStatusAt(stationKey, itemName, atDate, excludeId, log){
  const arr = (log[stationKey] && log[stationKey][itemName]) || [];
  const prior = arr.filter(x=> x.id!==excludeId && x.date < atDate).slice(-1)[0];
  if(!prior) return { status:'new', lastDate:null, expiry:null };
  const expiry = addYearsISO(prior.date, 1);
  return { status: (expiry && atDate<=expiry) ? 'in' : 'out', lastDate:prior.date, expiry };
}

/* 判斷一張工單整體落在統計表的哪一欄：
   - 使用類別＝保固內 → 整機保固，一律算「系統保固內」（部件自然也保固內）
   - 使用類別＝保固外 → 再看本次更換的品項，是否有任一項仍在「上次更換起算 1 年」的部件保固內，
     若有 → 系統保固外／部件保固內（此工單理論上該品項免費）；否則 → 系統保固外／部件保固外（正常收費） */
function classifyOrderWarranty(r, log){
  if((r['使用類別']||'')==='保固內') return 'sysIn';
  const items = (Array.isArray(r['維修項目']) ? r['維修項目'] : []).filter(it=>!it.isOther);
  if(!items.length) return 'sysOut_partOut';
  const key = stationKeyOf(r);
  const date = getRepairDate(r);
  const anyIn = items.some(it => partWarrantyStatusAt(key, it.name, date, r.id, log).status==='in');
  return anyIn ? 'sysOut_partIn' : 'sysOut_partOut';
}

function computeWarrantyBreakdownStats(){
  const range = state.repairsStatsRange;
  const filtered = state.repairs.filter(r=>{
    if(!range.from && !range.to) return true;
    const d = getRepairDate(r);
    if(!d) return false;
    if(range.from && d<range.from) return false;
    if(range.to && d>range.to) return false;
    return true;
  });
  const log = buildPartReplacementLog();
  const buckets = { sysIn:[], sysOut_partOut:[], sysOut_partIn:[] };
  filtered.forEach(r=> buckets[classifyOrderWarranty(r, log)].push(r));

  const summarize = list=>{
    const paid = list.filter(r=> r['收款狀態']==='已收費');
    const unpaid = list.filter(r=> r['收款狀態']!=='已收費');
    const amtOf = arr => arr.reduce((s,r)=> s + (parseFloat(r['維修金額'])||0), 0);
    return {
      count: list.length,
      paidCount: paid.length, unpaidCount: unpaid.length,
      paidAmt: amtOf(paid), unpaidAmt: amtOf(unpaid), totalAmt: amtOf(list)
    };
  };
  return {
    total: filtered.length,
    sysIn: summarize(buckets.sysIn),
    sysOutPartOut: summarize(buckets.sysOut_partOut),
    sysOutPartIn: summarize(buckets.sysOut_partIn)
  };
}

const PIE_COLORS = ['#1D4E5F','#E2A33D','#3F8F5F','#C1473A','#7148A6','#2E8B9A','#D98F2B','#5B6E7C','#8B9BA7','#9B5DE5','#00A896','#B7C1C8'];

/* rows: sorted [name, {count,qtySum,amountSum,unit}][] entries; builds a CSS conic-gradient pie + legend, capped at top 10 + "其他"
   使用「使用次數」計算佔比（不使用金額） */
function renderRepairItemsPie(rows, totalCount){
  if(!rows.length || totalCount<=0) return '';
  const top = rows.slice(0,10);
  const rest = rows.slice(10);
  const restCount = rest.reduce((s,[,v])=>s+v.count,0);
  const slices = top.map(([name,v],i)=>({name, value:v.count, color:PIE_COLORS[i%PIE_COLORS.length]}));
  if(restCount>0) slices.push({name:'其他', value:restCount, color:'#B7C1C8'});

  let acc = 0;
  const gradientParts = slices.map(s=>{
    const pct = totalCount ? (s.value/totalCount*100) : 0;
    const start = acc;
    acc += pct;
    return `${s.color} ${start.toFixed(2)}% ${acc.toFixed(2)}%`;
  }).join(', ');

  const legendHTML = slices.map(s=>{
    const pct = totalCount ? (s.value/totalCount*100) : 0;
    return `<div class="pie-legend-row"><span class="pie-dot" style="background:${s.color}"></span><span class="pie-legend-name">${esc(s.name)}</span><span class="pie-legend-val">${s.value} 次（${pct.toFixed(1)}%）</span></div>`;
  }).join('');

  return `
    <div class="pie-chart" style="background:conic-gradient(${gradientParts});"></div>
    <div class="pie-legend">${legendHTML}</div>
  `;
}

/* 通用圓餅圖：slices = [{name, value, color}]，unit 為圖例中的計量單位文字（如「個」「次」） */
function renderGenericPie(slices, unit){
  const total = slices.reduce((s,x)=>s+x.value,0);
  if(!slices.length || total<=0) return '';
  let acc = 0;
  const gradientParts = slices.map(s=>{
    const pct = total ? (s.value/total*100) : 0;
    const start = acc; acc += pct;
    return `${s.color} ${start.toFixed(2)}% ${acc.toFixed(2)}%`;
  }).join(', ');
  const legendHTML = slices.map(s=>{
    const pct = total ? (s.value/total*100) : 0;
    return `<div class="pie-legend-row"><span class="pie-dot" style="background:${s.color}"></span><span class="pie-legend-name">${esc(s.name)}</span><span class="pie-legend-val">${s.value}${unit||''}（${pct.toFixed(1)}%）</span></div>`;
  }).join('');
  return `
    <div class="pie-chart" style="background:conic-gradient(${gradientParts});"></div>
    <div class="pie-legend">${legendHTML}</div>
  `;
}

const TANK_STATUS_COLORS = { '未處理':'#C1473A', '已出單':'#D98F2B', '已清洗':'#3F8F5F' };

function computeTankStats(){
  const statuses = MODULES.tanks.statusOptions || [];
  const counts = {};
  statuses.forEach(s=>{ counts[s] = 0; });
  let unset = 0;
  state.tanks.forEach(t=>{
    const s = (t.status||'').trim();
    if(!s){ unset++; return; }
    counts[s] = (counts[s]||0) + 1;
  });
  return { counts, unset, total: state.tanks.length };
}

function findRepairItemStations(name){
  const { filtered } = computeRepairStats();
  const matches = [];
  filtered.forEach(r=>{
    (Array.isArray(r['維修項目'])?r['維修項目']:[]).forEach(it=>{
      if(it.name===name){
        matches.push({
          id:r.id,
          customer:r['客戶名稱'],
          stationId:r['貨品序號'],
          date:getRepairDate(r),
          qty:it.qty, unit:it.unit
        });
      }
    });
  });
  matches.sort((a,b)=> String(b.date||'').localeCompare(String(a.date||'')));
  return matches;
}

async function exportStatsPPT(){
  if(typeof PptxGenJS === 'undefined'){
    showToast('PPT 匯出元件載入失敗，請確認網路連線後重新整理再試', 'err');
    return;
  }
  const { filtered, rows } = computeRepairStats();
  if(!rows.length){
    showToast('此區間內沒有可匯出的維修品項資料', 'err');
    return;
  }
  const totalCount = rows.reduce((s,[,v])=>s+v.count,0);
  const range = state.repairsStatsRange;
  const rangeLabel = (range.from||range.to) ? `統計區間：${range.from||'—'} ～ ${range.to||'—'}` : '統計區間：全部';

  const pptx = new PptxGenJS();
  pptx.defineLayout({ name:'WIDE', width:13.33, height:7.5 });
  pptx.layout = 'WIDE';
  const slide = pptx.addSlide();
  slide.background = { color:'FFFFFF' };
  slide.addText('維修品項統計', { x:0.5, y:0.35, w:8, h:0.6, fontSize:26, bold:true, color:'0F323E' });
  slide.addText(`${rangeLabel}　｜　共 ${filtered.length} 筆工單　｜　${rows.length} 種品項　｜　總使用次數 ${totalCount}`,
    { x:0.5, y:0.95, w:12.3, h:0.4, fontSize:13, color:'5B6E7C' });

  const top = rows.slice(0,10);
  const rest = rows.slice(10);
  const restCount = rest.reduce((s,[,v])=>s+v.count,0);
  const chartLabels = top.map(([name])=>name).concat(restCount>0 ? ['其他'] : []);
  const chartValues = top.map(([,v])=>v.count).concat(restCount>0 ? [restCount] : []);
  const pieColorsHex = PIE_COLORS.map(c=>c.replace('#',''));

  if(totalCount>0){
    slide.addChart(pptx.ChartType.pie, [{ name:'使用次數佔比', labels: chartLabels, values: chartValues }], {
      x:0.5, y:1.5, w:6.2, h:5.3,
      showLegend:true, legendPos:'r', legendFontSize:11,
      showValue:false, showPercent:true, dataLabelFontSize:10,
      chartColors: pieColorsHex
    });
  }

  const tableRows = [[
    { text:'維修品項', options:{ bold:true, fill:{ color:'E4EAEC' } } },
    { text:'使用次數', options:{ bold:true, fill:{ color:'E4EAEC' } } },
    { text:'累計數量', options:{ bold:true, fill:{ color:'E4EAEC' } } }
  ]];
  rows.forEach(([name,v])=>{
    tableRows.push([ name, String(v.count), `${v.qtySum}${v.unit||''}` ]);
  });
  tableRows.push([
    { text:'總計', options:{ bold:true } }, String(totalCount), '—'
  ]);

  slide.addTable(tableRows, {
    x: totalCount>0 ? 7.0 : 0.5, y:1.5, w: totalCount>0 ? 5.8 : 12.3, h:5.3,
    fontSize:10, color:'152634', border:{ type:'solid', color:'DCE3E6', pt:0.5 },
    autoPage:true, autoPageRepeatHeader:true
  });

  try{
    await pptx.writeFile({ fileName:`維修品項統計_${todayISO()}.pptx` });
    showToast('已匯出 PPT');
  }catch(e){
    console.error('PPT export failed', e);
    showToast('PPT 匯出失敗，請重試', 'err');
  }
}

/* 通用時間區間篩選：repairs 一律用「報修日期」、installs 用 cfg.dateField（裝機日期） */
const LIST_RANGE_STATE_KEY = { repairs:'repairsListRange', installs:'installsListRange' };
function getModuleDate(key, r){
  if(key==='repairs') return getRepairDate(r);
  const cfg = MODULES[key];
  if(cfg && cfg.dateField) return normDate(r[cfg.dateField]);
  return '';
}
function clearListRange(key){
  const sk = LIST_RANGE_STATE_KEY[key];
  if(!sk) return;
  state[sk] = { from:'', to:'' };
  if(PAGINATED_KEYS.includes(key)) state.page[key] = 1;
  renderContent();
}

/* 共用篩選邏輯（搜尋 / 狀態 / 日期區間），供列表渲染與「全選目前畫面」共用，避免邏輯分岔 */
function getFilteredModuleRows(key){
  const cfg = MODULES[key];
  let rows = state[key].filter(r => matchesSearch(r, state.search[key]))
    .filter(r => {
      if(!cfg.statusField) return true;
      if(!state.filter[key]) return true;
      return (r[cfg.statusField]||'') === state.filter[key] || (!r[cfg.statusField] && state.filter[key]==='__empty__');
    });
  const rangeStateKey = LIST_RANGE_STATE_KEY[key];
  if(rangeStateKey){
    const lr = state[rangeStateKey];
    if(lr.from || lr.to){
      rows = rows.filter(r=>{
        const d = getModuleDate(key, r);
        if(!d) return false;
        if(lr.from && d < lr.from) return false;
        if(lr.to && d > lr.to) return false;
        return true;
      });
    }
  }
  if(key==='repairs'){
    rows = [...rows].sort((a,b)=> String(b['報修單號']||'').localeCompare(String(a['報修單號']||''), undefined, {numeric:true}));
  }
  return rows;
}

/* 分頁：目前僅維修工單啟用，之後要讓其他分頁也支援可以把 key 加進 PAGINATED_KEYS */
const PAGINATED_KEYS = ['repairs'];
const PAGE_SIZE_OPTIONS = [10, 20, 50, 100];

function getPagedRows(key){
  const allRows = getFilteredModuleRows(key);
  if(!PAGINATED_KEYS.includes(key)){
    return { rows: allRows, allRows, page:1, pageSize: allRows.length||1, totalPages:1, totalRows: allRows.length };
  }
  const pageSize = state.pageSize[key] || 10;
  const totalRows = allRows.length;
  const totalPages = Math.max(1, Math.ceil(totalRows / pageSize));
  let page = state.page[key] || 1;
  if(page > totalPages) page = totalPages;
  if(page < 1) page = 1;
  state.page[key] = page;
  const start = (page-1) * pageSize;
  const rows = allRows.slice(start, start + pageSize);
  return { rows, allRows, page, pageSize, totalPages, totalRows };
}

function setPageSize(key, size){
  state.pageSize[key] = parseInt(size,10) || 10;
  state.page[key] = 1;
  renderContent();
}

function goToPage(key, page){
  state.page[key] = page;
  renderContent();
  const wrap = document.querySelector('.table-wrap');
  if(wrap) wrap.scrollIntoView({behavior:'smooth', block:'start'});
}

function renderPaginationBar(key, pageInfo){
  if(!PAGINATED_KEYS.includes(key) || pageInfo.totalRows===0) return '';
  const { page, totalPages, pageSize, totalRows } = pageInfo;
  return `
    <div class="pagination-bar">
      <label style="display:flex;align-items:center;gap:6px;">每頁顯示
        <select class="filter-select" onchange="app.setPageSize('${key}', this.value)">
          ${PAGE_SIZE_OPTIONS.map(n=>`<option value="${n}" ${pageSize===n?'selected':''}>${n} 筆</option>`).join('')}
        </select>
      </label>
      <div class="pagination-nav">
        <button class="btn btn-ghost btn-sm" ${page<=1?'disabled':''} onclick="app.goToPage('${key}', ${page-1})">‹ 上一頁</button>
        <span class="hint">第 ${page} / ${totalPages} 頁（共 ${totalRows} 筆）</span>
        <button class="btn btn-ghost btn-sm" ${page>=totalPages?'disabled':''} onclick="app.goToPage('${key}', ${page+1})">下一頁 ›</button>
      </div>
    </div>`;
}

function wireModuleTabEvents(key){
  const cfg = MODULES[key];
  if(key==='repairs' && state.repairsView==='stats'){
    const fromEl = document.getElementById('stats_from');
    const toEl = document.getElementById('stats_to');
    if(fromEl) fromEl.addEventListener('change', e=>{ state.repairsStatsRange.from = e.target.value; renderContent(); });
    if(toEl) toEl.addEventListener('change', e=>{ state.repairsStatsRange.to = e.target.value; renderContent(); });
    return;
  }
  const searchEl = document.getElementById('search_'+key);
  if(searchEl){
    searchEl.addEventListener('input', (e)=>{
      state.search[key] = e.target.value;
      if(PAGINATED_KEYS.includes(key)) state.page[key] = 1;
      const pos = e.target.selectionStart;
      renderContent();
      const el2 = document.getElementById('search_'+key);
      if(el2){ el2.focus(); el2.setSelectionRange(pos,pos); }
    });
  }
  const filterEl = document.getElementById('filter_'+key);
  if(filterEl){
    filterEl.addEventListener('change', (e)=>{
      state.filter[key]=e.target.value;
      if(PAGINATED_KEYS.includes(key)) state.page[key] = 1;
      renderContent();
    });
  }
  const rangeStateKey = LIST_RANGE_STATE_KEY[key];
  if(rangeStateKey){
    const rFromEl = document.getElementById('list_range_from');
    const rToEl = document.getElementById('list_range_to');
    if(rFromEl) rFromEl.addEventListener('change', e=>{ state[rangeStateKey].from = e.target.value; if(PAGINATED_KEYS.includes(key)) state.page[key] = 1; renderContent(); });
    if(rToEl) rToEl.addEventListener('change', e=>{ state[rangeStateKey].to = e.target.value; if(PAGINATED_KEYS.includes(key)) state.page[key] = 1; renderContent(); });
  }
}



/* ============ Repair items checklist (維修工單 專用) ============ */
function renderRepairItemsSection(data){
  const catalog = state.repairItemCatalog || [];

  const otherItem = existing.find(x=>x.isOther);

    const match = existing.find(x=>x.name===it.name && !x.isOther);
    const checked = !!match;
    const qtyVal = match ? match.qty : (it.unit ? '' : 1);

    const info = partWarrantyStatusAt(stKey, it.name, atDate, data.id, log);
    const warrantyBadge = info.status==='in'
      ? `<span class="tag-chip" style="background:var(--success-tint);color:var(--success);border-color:var(--success);white-space:nowrap;">🛡️ 保固內至 ${esc(info.expiry)}</span>`

      <td>${esc(it.name)}</td>
      <td class="cell-mono">$${it.price}${it.unit?('/'+esc(it.unit)):''}</td>
      <td><input type="number" min="0" step="0.1" style="width:74px;" id="ri_qty_${idx}" value="${esc(qtyVal)}" oninput="app.updateRepairItemsCalc()" placeholder="${it.unit?esc(it.unit):'數量'}"></td>
      <td class="cell-mono" id="ri_sub_${idx}">$0</td>

        <select class="ri-bill-select" id="ri_bill_${idx}" onchange="app.updateRepairItemsCalc()">
          <option value="1" ${billable?'selected':''}>收費</option>
          <option value="0" ${!billable?'selected':''}>不收費</option>

    <div class="field full">

      <div class="repair-items-wrap">
        <table class="repair-items-table">

            ${rowsHTML}
            <tr>
              <td style="text-align:center;"><input type="checkbox" id="ri_chk_other" onchange="app.updateRepairItemsCalc()" ${otherItem?'checked':''}></td>
              <td><input type="text" id="ri_other_name" placeholder="其他項目名稱" value="${esc(otherItem?otherItem.name:'')}" style="width:100%;"></td>
              <td><input type="number" min="0" id="ri_other_price" placeholder="單價" value="${esc(otherItem?otherItem.unitPrice:'')}" style="width:78px;" oninput="app.updateRepairItemsCalc()"></td>
              <td><input type="number" min="0" step="0.1" id="ri_other_qty" placeholder="數量" value="${esc(otherItem?otherItem.qty:1)}" style="width:74px;" oninput="app.updateRepairItemsCalc()"></td>
              <td class="cell-mono" id="ri_sub_other">$0</td>
              <td>
                <select class="ri-bill-select" id="ri_bill_other" onchange="app.updateRepairItemsCalc()">

                </select>

          項目小計合計：<strong id="ri_total">$0</strong>

          <button type="button" class="btn btn-ghost btn-sm" onclick="app.applyRepairItemsTotal()">帶入維修金額</button>

function updateRepairItemsCalc(){
  let total = 0;
  let hasFree = false;
  (state.repairItemCatalog||[]).forEach((it,idx)=>{
    const chk = document.getElementById('ri_chk_'+idx);
    const qtyEl = document.getElementById('ri_qty_'+idx);
    const subEl = document.getElementById('ri_sub_'+idx);
    const billEl = document.getElementById('ri_bill_'+idx);
    if(!chk || !qtyEl || !subEl) return;
    const qty = parseFloat(qtyEl.value)||0;
    const billable = !billEl || billEl.value!=='0';
    const sub = chk.checked ? qty*it.price : 0;
    subEl.textContent = '$'+sub.toLocaleString() + (chk.checked && !billable ? '（不收費）' : '');
    if(chk.checked && billable) total += sub;
    if(chk.checked && !billable) hasFree = true;
  });
  const otherChk = document.getElementById('ri_chk_other');
  const otherPriceEl = document.getElementById('ri_other_price');
  const otherQtyEl = document.getElementById('ri_other_qty');
  const otherSubEl = document.getElementById('ri_sub_other');
  const otherBillEl = document.getElementById('ri_bill_other');
  if(otherChk && otherPriceEl && otherQtyEl && otherSubEl){
    const price = parseFloat(otherPriceEl.value)||0;
    const qty = parseFloat(otherQtyEl.value)||0;
    const billable = !otherBillEl || otherBillEl.value!=='0';
    const sub = otherChk.checked ? qty*price : 0;
    otherSubEl.textContent = '$'+sub.toLocaleString() + (otherChk.checked && !billable ? '（不收費）' : '');
    if(otherChk.checked && billable) total += sub;
    if(otherChk.checked && !billable) hasFree = true;
  }
  const totalEl = document.getElementById('ri_total');
  if(totalEl) totalEl.textContent = '$'+total.toLocaleString();
  const freeNoteEl = document.getElementById('ri_free_note');
  if(freeNoteEl) freeNoteEl.style.display = hasFree ? '' : 'none';
  if(freeNoteEl && hasFree) freeNoteEl.textContent = '（不含不收費項目金額）';
}

function applyRepairItemsTotal(){
  const totalEl = document.getElementById('ri_total');
  const amountEl = document.getElementById('fld_維修金額');
  if(totalEl && amountEl){
    amountEl.value = (totalEl.textContent||'').replace(/[^0-9.]/g,'');
    showToast('已將項目小計帶入維修金額欄位');
  }
}

function collectRepairItems(){
  const items = [];
  (state.repairItemCatalog||[]).forEach((it,idx)=>{
    const chk = document.getElementById('ri_chk_'+idx);
    if(chk && chk.checked){
      const qtyEl = document.getElementById('ri_qty_'+idx);
      const billEl = document.getElementById('ri_bill_'+idx);
      const qty = parseFloat(qtyEl.value)||0;
      const billable = !billEl || billEl.value!=='0';
      items.push({name:it.name, unit:it.unit, unitPrice:it.price, qty, subtotal:+(qty*it.price).toFixed(2), billable});
    }
  });
  const otherChk = document.getElementById('ri_chk_other');
  if(otherChk && otherChk.checked){
    const nameEl = document.getElementById('ri_other_name');
    const priceEl = document.getElementById('ri_other_price');
    const qtyEl = document.getElementById('ri_other_qty');
    const billEl = document.getElementById('ri_bill_other');
    const name = (nameEl.value||'其他').trim() || '其他';
    const unitPrice = parseFloat(priceEl.value)||0;
    const qty = parseFloat(qtyEl.value)||1;
    const billable = !billEl || billEl.value!=='0';
    items.push({name, unit:null, unitPrice, qty, subtotal:+(qty*unitPrice).toFixed(2), isOther:true, billable});
  }
  return items;
}

/* ============ Form field rendering ============ */
function renderField(f, data){
  const val = data[f.key];
  const wrapClass = 'field' + (f.full ? ' full' : '');
  let inputHTML = '';
  if(f.type==='select'){
    const opts = f.dynamicSource ? (state[f.dynamicSource]||[]) : f.options;
    const knownVal = opts.includes(val);
    inputHTML = `<select id="fld_${f.key}">
      <option value="">— 未設定 —</option>
      ${opts.map(o=>`<option value="${esc(o)}" ${val===o?'selected':''}>${esc(o)}</option>`).join('')}
      ${(val && !knownVal) ? `<option value="${esc(val)}" selected>${esc(val)}（匯入值）</option>` : ''}
    </select>`;
  } else if(f.type==='textarea'){
    inputHTML = `<textarea id="fld_${f.key}">${esc(val||'')}</textarea>`;
  } else if(f.type==='multiselect'){
    const opts = f.dynamicSource ? (state[f.dynamicSource]||[]) : f.options;
    const selected = Array.isArray(val) ? val : (val ? [val] : []);
    const limitAttr = f.maxSelect ? ` onchange="app.enforceCheckboxLimit(this,${f.maxSelect})"` : '';
    const extraVals = selected.filter(v=>v && !opts.includes(v));
    inputHTML = `<div class="checkbox-row">${opts.map(o=>`
      <label><input type="checkbox" value="${esc(o)}" data-multi="${f.key}" ${selected.includes(o)?'checked':''}${limitAttr}> ${esc(o)}</label>
    `).join('')}${extraVals.map(v=>`
      <label><input type="checkbox" value="${esc(v)}" data-multi="${f.key}" checked${limitAttr}> ${esc(v)}（匯入值）</label>
    `).join('')}</div>`;
  } else {
    inputHTML = `<input type="${f.type==='number'?'number':(f.type==='date'?'date':(f.type==='time'?'time':'text'))}" id="fld_${f.key}" value="${esc(val||'')}">`;
  }
  return `<div class="${wrapClass}"><label>${esc(f.label)}${f.required?' *':''}</label>${inputHTML}</div>`;
}

function collectFormData(fields){
  const out = {};
  fields.forEach(f=>{
    if(f.type==='multiselect'){
      const boxes = document.querySelectorAll(`[data-multi="${f.key}"]:checked`);
      out[f.key] = Array.from(boxes).map(b=>b.value);
    } else {
      const el = document.getElementById('fld_'+f.key);
      out[f.key] = el ? el.value : '';
    }
  });
  return out;
}

/* 限制複選 checkbox 群組最多可選幾項，超過時取消最新勾選並提示 */
function enforceCheckboxLimit(el, max){
  if(!el.checked) return;
  const group = document.querySelectorAll(`[data-multi="${el.dataset.multi}"]`);
  const checked = Array.from(group).filter(c=>c.checked);
  if(checked.length > max){
    el.checked = false;
    showToast(`最多只能選擇 ${max} 位`, 'err');
  }
}

function openDetail(key, id){
  const cfg = MODULES[key];
  const item = state[key].find(r=>r.id===id);
  if(!item) return;

  const rowsHTML = cfg.fields.map(f=>{
    const val = item[f.key];
    let display;
    if(f.type==='select' && cfg.statusField===f.key){
      display = val ? badge(val) : '<span class="detail-empty">—</span>';
    } else if(f.type==='multiselect'){
      display = (Array.isArray(val) && val.length) ? val.map(v=>`<span class="badge badge-grey">${esc(v)}</span>`).join(' ') : '<span class="detail-empty">—</span>';
    } else if(f.type==='date'){
      display = val ? `<span class="cell-mono">${esc(fmtDate(val))}</span>` : '<span class="detail-empty">—</span>';
    } else if(f.key==='照片' && val){
      display = `<a href="${esc(val)}" target="_blank" rel="noopener" style="color:var(--primary);font-weight:600;">開啟連結 ↗</a>`;
    } else if(STATION_ID_FIELDS.includes(f.key)){
      display = val ? esc(fmtStationId(val)) : '<span class="detail-empty">—</span>';
    } else {
      display = val ? esc(val).replace(/\n/g,'<br>') : '<span class="detail-empty">—</span>';
    }
    return `<div class="detail-row"><div class="detail-label">${esc(f.label)}</div><div class="detail-value">${display}</div></div>`;
  }).join('');

  let repairItemsHTML = '';
  if(key==='repairs'){
    const items = Array.isArray(item['維修項目']) ? item['維修項目'] : [];
    const total = items.reduce((s,it)=>s+(it.billable===false ? 0 : (it.subtotal||0)),0);

/* 自動辨識：維修工單只要「維修描述」與「維修人員」都有填寫，就自動把「維修狀況」改成「已完修」
   （不論目前狀況是什麼，包含轉嘉油、轉尚恩等自訂狀況也會被覆蓋） */
function applyRepairAutoStatus(){
  const descEl = document.getElementById('fld_維修描述');
  const statusEl = document.getElementById('fld_維修狀況');
  if(!descEl || !statusEl) return;
  const hasDesc = descEl.value.trim();
  const hasEngineer = document.querySelectorAll('[data-multi="維修人員1名稱"]:checked').length > 0;
  if(hasDesc && hasEngineer && statusEl.value!=='已完修'){
    const hasOption = Array.from(statusEl.options).some(o=>o.value==='已完修');
    if(hasOption){
      statusEl.value = '已完修';
      showToast('已偵測到維修描述與維修人員，自動將狀況設為「已完修」');
    }
  }
}
function wireRepairAutoStatus(){
  const descEl = document.getElementById('fld_維修描述');
  if(descEl) descEl.addEventListener('input', applyRepairAutoStatus);
  document.querySelectorAll('[data-multi="維修人員1名稱"]').forEach(cb=>cb.addEventListener('change', applyRepairAutoStatus));
}

/* 自動辨識：輸入「維修描述」時，比對文字裡有沒有提到維修項目目錄中的品項名稱，
   有提到就自動幫該品項打勾（只會勾選，不會自動取消，避免跟使用者手動操作打架） */
function detectRepairItemsFromDescription(){
  const descEl = document.getElementById('fld_維修描述');
  if(!descEl) return;
  const text = descEl.value || '';
  if(!text.trim()) return;
  const catalog = state.repairItemCatalog || [];
  let matchedNames = [];
  catalog.forEach((it, idx)=>{
    if(!it.name) return;
    const names = [it.name, ...(REPAIR_ITEM_ALIASES[it.name]||[])];
    if(!names.some(n=>text.includes(n))) return;
    const chk = document.getElementById('ri_chk_'+idx);
    if(!chk || chk.checked) return;
    chk.checked = true;
    const qtyEl = document.getElementById('ri_qty_'+idx);
    if(qtyEl && !qtyEl.value) qtyEl.value = 1;
    matchedNames.push(it.name);
  });
  if(matchedNames.length){
    updateRepairItemsCalc();
    showToast(`已根據維修描述自動勾選：${matchedNames.join('、')}，請確認數量與收費是否正確`);
  }
}
function wireRepairItemAutoDetect(){
  const descEl = document.getElementById('fld_維修描述');
  if(descEl) descEl.addEventListener('input', detectRepairItemsFromDescription);
}

/* 派修：勾選「已派修」時，若「派修日期」尚未填寫，預設帶入今天日期（使用者可自行改成其他日期，
   之後在「近期安排」會依這個日期自動歸類成今日派修／明日派修） */
function applyRepairDispatchDate(){
  const dispatchEl = document.getElementById('fld_派修');
  const dateEl = document.getElementById('fld_派修日期');
  if(!dispatchEl || !dateEl) return;
  if(dispatchEl.value==='已派修' && !dateEl.value){
    dateEl.value = todayISO();
  }
}
function wireRepairDispatch(){
  const dispatchEl = document.getElementById('fld_派修');
  if(dispatchEl) dispatchEl.addEventListener('change', applyRepairDispatchDate);
}

async function saveForm(key, id){
  const cfg = MODULES[key];
  const requiredMissing = cfg.fields.filter(f=>f.required).find(f=>{
    const el = document.getElementById('fld_'+f.key);
    return el && !el.value.trim();
  });
  if(requiredMissing){
    showToast(`請填寫「${requiredMissing.label}」`, 'err');
    return;
  }
  const formData = collectFormData(cfg.fields);
  STATION_ID_FIELDS.forEach(fk=>{ if(fk in formData) formData[fk] = fmtStationId(formData[fk]); });
  if(key==='repairs'){ formData['維修項目'] = collectRepairItems(); }

  /* 保險機制：存檔時再次確認，若維修描述與維修人員都有值就自動設為已完修（覆蓋原本狀況） */
  if(key==='repairs') applyRepairAutoStatusToObj(formData);

  /* 維修工單新增或編輯時，只要報修單號跟其他工單相同，就跳出提醒（可選擇仍要繼續） */
  if(key==='repairs'){
    const orderNo = (formData['報修單號']||'').trim();
    if(orderNo){
      const dup = state.repairs.find(r=>(r['報修單號']||'').trim()===orderNo && r.id!==id);
      if(dup){
        confirmRepairDuplicateWarning(id, formData, dup);
        return;
      }
    }
  }

  await commitSaveForm(key, id, formData);
}

async function commitSaveForm(key, id, formData, toastMsg){
  if(id){
    const idx = state[key].findIndex(r=>r.id===id);
    if(idx>-1) state[key][idx] = {...state[key][idx], ...formData};
  } else {
    state[key].push(withId({...formData}));
  }
  closeModal();
  renderContent();
  await persist(key);
  showToast(toastMsg || (id ? '已儲存變更' : '已新增資料'));
}

/* 報修單號重複：新增或編輯時都會檢查，跳出提醒視窗，使用者可選擇返回修改或仍要繼續 */
function confirmRepairDuplicateWarning(id, formData, existing){
  window.__pendingRepairDuplicate = { id, formData };
  openModalHTML(`
    <div class="modal-head"><h3>⚠️ 報修單號重複</h3><button class="modal-close" onclick="app.closeModal()">✕</button></div>
    <div class="modal-body">
      <p>報修單號「${esc(formData['報修單號']||'')}」已經存在下列工單：</p>
      <div class="panel" style="margin-top:10px;">
        <div style="padding:12px 14px;font-size:13px;line-height:1.8;color:var(--ink);">
          客戶名稱：${esc(existing['客戶名稱']||'—')}<br>
          報修日期：${esc(existing['報修日期']||'—')}<br>
          維修狀況：${esc(existing['維修狀況']||'—')}<br>
          狀況描述：${esc(existing['狀況描述']||'—')}
        </div>
      </div>
      <p style="margin-top:12px;color:var(--ink-soft);font-size:13px;">請確認是否為重複報修。如果不是重複，可以直接繼續新增／儲存。</p>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="app.cancelRepairDuplicate()">返回修改</button>
      <button class="btn btn-primary" onclick="app.confirmRepairDuplicateProceed()">仍要繼續</button>
    </div>
  `);
}

function cancelRepairDuplicate(){
  const pending = window.__pendingRepairDuplicate;
  window.__pendingRepairDuplicate = null;
  if(pending) openFormModal('repairs', {...pending.formData, id:pending.id||''}, !pending.id);
  else closeModal();
}

async function confirmRepairDuplicateProceed(){
  const pending = window.__pendingRepairDuplicate;
  window.__pendingRepairDuplicate = null;
  if(!pending){ closeModal(); return; }
  await commitSaveForm('repairs', pending.id, pending.formData, pending.id ? '已儲存變更' : '已新增資料');
}

function confirmDelete(key, id){
  const cfg = MODULES[key];
  openModalHTML(`
    <div class="modal-head"><h3>刪除確認</h3><button class="modal-close" onclick="app.closeModal()">✕</button></div>
    <div class="modal-body"><p>確定要刪除這筆${esc(cfg.title)}資料嗎？此動作無法復原。</p></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="app.closeModal()">取消</button>
      <button class="btn btn-danger" onclick="app.doDelete('${key}','${id}')">確定刪除</button>
    </div>
  `);
}
async function doDelete(key, id){
  state[key] = state[key].filter(r=>r.id!==id);
  if(state.selection[key]) state.selection[key].delete(id);
  closeModal();
  renderContent();
  await persist(key);
  showToast('已刪除');
}

/* ============ 批次選取／刪除 ============ */
function toggleRowSelect(key, id, checked){
  if(!state.selection[key]) state.selection[key] = new Set();
  if(checked) state.selection[key].add(id); else state.selection[key].delete(id);
  renderContent();
}

function toggleSelectAllRows(key, checked){
  if(!state.selection[key]) state.selection[key] = new Set();
  const rows = getPagedRows(key).rows;
  if(checked) rows.forEach(r=> state.selection[key].add(r.id));
  else rows.forEach(r=> state.selection[key].delete(r.id));
  renderContent();
}

function confirmBatchDelete(key){
  const cfg = MODULES[key];
  const ids = Array.from(state.selection[key]||[]);
  if(!ids.length) return;
  const sample = state[key].filter(r=>ids.includes(r.id)).slice(0,6);
  const titleField = cfg.titleField || (cfg.fields.find(f=>f.required)||{}).key || cfg.fields[0].key;
  const previewHTML = sample.map(r=>`<li>${esc(r[titleField]||r['客戶名稱']||r['站點']||r['車號']||'（未命名）')}</li>`).join('');
  const moreNote = ids.length>sample.length ? `<p style="margin:6px 0 0;color:var(--ink-faint);font-size:12px;">…等共 ${ids.length} 筆</p>` : '';
  openModalHTML(`
    <div class="modal-head"><h3>⚠️ 刪除選取的 ${ids.length} 筆${cfg.title}</h3><button class="modal-close" onclick="app.closeModal()">✕</button></div>
    <div class="modal-body">
      <p style="margin:0 0 8px;color:var(--ink-soft);font-size:13px;">確定要刪除以下選取的 ${ids.length} 筆資料嗎？此動作無法復原。</p>
      <ul style="margin:0;padding-left:20px;font-size:13px;color:var(--ink);line-height:1.8;">${previewHTML}</ul>
      ${moreNote}
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="app.closeModal()">取消</button>
      <button class="btn btn-danger" onclick="app.doBatchDelete('${key}')">確定刪除 ${ids.length} 筆</button>
    </div>
  `);
}

async function doBatchDelete(key){
  const ids = new Set(state.selection[key]||[]);
  if(!ids.size){ closeModal(); return; }
  state[key] = state[key].filter(r=>!ids.has(r.id));
  state.selection[key] = new Set();
  closeModal();
  renderContent();
  await persist(key);
  showToast(`已刪除 ${ids.size} 筆資料`);
}

function matchFieldForHeader(header, moduleKey){
  const h = String(header||'').trim();
  if(!h) return null;
  const cfg = MODULES[moduleKey];
  const exact = cfg.fields.find(f=>f.key===h || f.label===h);
  if(exact) return exact.key;
  const alias = (FIELD_ALIASES[moduleKey]||{})[h];
  if(alias) return alias;
  const fuzzy = cfg.fields.find(f=> h.includes(f.label) || f.label.includes(h) || h.includes(f.key) || (f.key.length>1 && f.key.includes(h)));
  if(fuzzy) return fuzzy.key;
  return null;
}

function parseSheetRows(ws, moduleKey){
  const aoa = XLSX.utils.sheet_to_json(ws, {header:1, raw:false, defval:'', dateNF:'yyyy-mm-dd'});
  let bestIdx = 0, bestScore = -1;
  const scanLimit = Math.min(15, aoa.length);
  for(let i=0;i<scanLimit;i++){
    const row = aoa[i];
    if(!row || !row.length) continue;
    let score = 0;
    row.forEach(cell=>{ if(matchFieldForHeader(cell, moduleKey)) score++; });
    if(score > bestScore){ bestScore = score; bestIdx = i; }
  }
  const headerRow = (aoa[bestIdx]||[]).map(h=>String(h||'').trim());
  const dataRows = aoa.slice(bestIdx+1).filter(r=>r && r.some(c=>String(c||'').trim()!==''));
  return {headerRow, dataRows};
}

/* 匯出指定模組的資料為 Excel 檔案，欄位使用中文標籤，陣列型欄位（例如多選）以「、」串接 */
function exportModuleExcel(key){
  const cfg = MODULES[key];
  const rows = state[key] || [];
  if(!rows.length){ showToast('目前沒有資料可以匯出', 'err'); return; }
  const data = rows.map(r=>{
    const obj = {};
    cfg.fields.forEach(f=>{
      let val = r[f.key];
      if(Array.isArray(val)) val = val.join('、');
      if(STATION_ID_FIELDS.includes(f.key) && val) val = fmtStationId(val);
      obj[f.label] = (val===undefined || val===null) ? '' : val;
    });
    return obj;
  });
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, cfg.title.slice(0,31));
  const fname = `${cfg.title}_${todayISO()}.xlsx`;
  XLSX.writeFile(wb, fname);
  showToast(`已匯出「${fname}」`);
}

async function confirmImport(){
  const ctx = state.importCtx;
  const key = ctx.key;
  const cfg = MODULES[key];
  const selects = document.querySelectorAll('#modalRoot [data-col]');
  const colToField = {};
  selects.forEach(s=>{ if(s.value) colToField[+s.dataset.col] = s.value; });

  if(Object.keys(colToField).length === 0){
    showToast('請至少對應一個欄位再匯入', 'err');
    return;
  }

  const rowObjs = [];
  ctx.dataRows.forEach(row=>{
    const obj = {};
    let hasValue = false;
    Object.entries(colToField).forEach(([ci, fieldKey])=>{
      let val = row[+ci];
      if(val === undefined || val === null) val = '';
      val = String(val).trim();
      const fieldDef = cfg.fields.find(f=>f.key===fieldKey);
      if(fieldDef && fieldDef.type==='multiselect'){
        obj[fieldKey] = val ? val.split(/[、,，\/／\s]+/).filter(Boolean) : [];
      } else if(STATION_ID_FIELDS.includes(fieldKey)){
        obj[fieldKey] = fmtStationId(val);
      } else {
        obj[fieldKey] = val;
      }
      if(val) hasValue = true;
    });
    if(hasValue) rowObjs.push(obj);
  });

  /* 匯入的維修工單也套用自動辨識：維修描述與維修人員都有值就自動設為已完修
     （rowObjs 的物件參照後續也會被 dupPairs/freshRows 使用，這裡改好即可套用到覆蓋與新增） */
  if(key==='repairs') rowObjs.forEach(applyRepairAutoStatusToObj);

  /* 維修工單匯入時，依「報修單號」比對是否已存在相同單號的既有工單，若有先詢問要覆蓋還是略過 */
  if(key==='repairs' && Object.values(colToField).includes('報修單號')){
    const dupPairs = [];
    const freshRows = [];
    rowObjs.forEach(obj=>{
      const orderNo = (obj['報修單號']||'').trim();
      const existing = orderNo ? state.repairs.find(r=>(r['報修單號']||'').trim()===orderNo) : null;
      if(existing) dupPairs.push({existing, obj});
      else freshRows.push(obj);
    });
    if(dupPairs.length){
      showImportDuplicateConfirm(key, cfg, freshRows, dupPairs);
      return;
    }
  }

  await commitImportRows(key, cfg, rowObjs);
}

async function commitImportRows(key, cfg, rowObjs){
  rowObjs.forEach(obj=> state[key].push(withId(obj)));
  closeModal();
  renderContent();
  await persist(key);
  showToast(`已匯入 ${rowObjs.length} 筆資料到「${cfg.title}」`);
  state.importCtx = null;
}

/* 匯入時發現報修單號重複：列出重複清單，詢問要覆蓋既有工單、略過重複只匯入新資料，還是返回調整欄位對應 */
function showImportDuplicateConfirm(key, cfg, freshRows, dupPairs){
  window.__pendingImportDup = { key, cfg, freshRows, dupPairs };
  const previewRows = dupPairs.slice(0,8).map(({existing,obj})=>`
    <div class="detail-row">
      <div class="detail-label">單號 ${esc(obj['報修單號']||'')}</div>
      <div class="detail-value">
        既有：${esc(existing['客戶名稱']||'—')}／${esc(truncate(existing['狀況描述']||'',26))}<br>
        匯入：${esc(obj['客戶名稱']||'—')}／${esc(truncate(obj['狀況描述']||'',26))}
      </div>
    </div>`).join('');
  const moreNote = dupPairs.length>8 ? `<p style="margin:8px 0 0;color:var(--ink-faint);font-size:12px;">…等共 ${dupPairs.length} 筆單號重複，僅預覽前 8 筆</p>` : '';

  openModalHTML(`
    <div class="modal-head"><h3>⚠️ 發現 ${dupPairs.length} 筆報修單號重複</h3><button class="modal-close" onclick="app.cancelImportDuplicate()">✕</button></div>
    <div class="modal-body">
      <p style="margin:0 0 10px;color:var(--ink-soft);font-size:13px;">以下報修單號在既有工單中已經存在，請選擇要如何處理這些重複資料。${freshRows.length ? `另有 <b>${freshRows.length}</b> 筆單號不重複，無論選擇哪一種方式都會直接匯入。` : ''}</p>
      <div class="detail-list">${previewRows}</div>
      ${moreNote}
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="app.cancelImportDuplicate()">返回調整對應</button>
      <button class="btn btn-ghost" onclick="app.resolveImportDuplicate('skip')">略過重複，只匯入新資料</button>
      <button class="btn btn-danger" onclick="app.resolveImportDuplicate('overwrite')">覆蓋重複的既有工單</button>
    </div>
  `);
}

function cancelImportDuplicate(){
  const pending = window.__pendingImportDup;
  window.__pendingImportDup = null;
  if(pending) renderImportPreview();
  else closeModal();
}

async function resolveImportDuplicate(mode){
  const pending = window.__pendingImportDup;
  window.__pendingImportDup = null;
  if(!pending){ closeModal(); return; }
  const { key, cfg, freshRows, dupPairs } = pending;
  freshRows.forEach(obj=> state[key].push(withId(obj)));
  let overwritten = 0;
  if(mode==='overwrite'){
    dupPairs.forEach(({existing,obj})=>{
      const idx = state[key].findIndex(r=>r.id===existing.id);
      if(idx>-1){ state[key][idx] = {...state[key][idx], ...obj}; overwritten++; }
    });
  }
  closeModal();
  renderContent();
  await persist(key);
  const skipped = mode==='overwrite' ? 0 : dupPairs.length;
  showToast(`已匯入 ${freshRows.length} 筆新資料${overwritten?`，覆蓋 ${overwritten} 筆重複工單`:''}${skipped?`，略過 ${skipped} 筆重複單號`:''}`);
  state.importCtx = null;
}

    { icon:'🧰', title:'管理維修項目', desc:'設定維修工單中可勾選的維修品項與單價，供工單自動試算金額。', count:`${(state.repairItemCatalog||[]).length} 個品項`, action:`app.openRepairItemCatalogManager()` },
    { icon:'🚚', title:'管理車輛', desc:'設定貨車領用登記時可選擇的車號清單。', count:`${(state.vehicles||[]).length} 台車輛`, action:`app.openListManager('vehicles')` },
    { icon:'👷', title:'管理工程人員', desc:'設定貨車領用登記時可選擇的工程人員名單。', count:`${(state.engineers||[]).length} 位人員`, action:`app.openListManager('engineers')` },
  ];
  return `
    <div class="section-head" style="margin-top:0;">
      <h2>⚙️ 管理維護</h2>
      <span class="hint">集中管理各分頁使用的設定選項</span>
    </div>
    <div class="settings-grid">
      ${cards.map(c=>`
        <div class="settings-card">
          <div class="sc-icon">${c.icon}</div>
          <div class="sc-title">${esc(c.title)}</div>
          <div class="sc-desc">${esc(c.desc)}</div>
          <div class="sc-count">${esc(c.count)}</div>
          <button class="btn btn-primary btn-sm" onclick="${c.action}">前往管理</button>
        </div>`).join('')}
    </div>
  `;
}

const TAB_LIST = [
  {key:'overview', label:'總覽', icon:'📊'},
  {key:'repairs', label:'維修工單', icon:'🔧'},
  {key:'schedule', label:'近期安排', icon:'📅'},
  {key:'tanks', label:'桶槽清洗', icon:'🛢️'},
  {key:'installs', label:'裝機管理', icon:'🏗️'},
  {key:'trucks', label:'貨車登記', icon:'🚚'},
  {key:'settings', label:'管理維護', icon:'⚙️'},
];

function renderTabs(){
  const nav = document.getElementById('tabs');
  nav.innerHTML = TAB_LIST.map(t=>`
    <button class="tab-btn ${state.activeTab===t.key?'active':''}" onclick="app.goTab('${t.key}')">
      <span class="tab-ico">${t.icon}</span>${esc(t.label)}
    </button>`).join('');
}

function renderContent(){
  const el = document.getElementById('content');
  let html = '';
  if(state.activeTab==='overview') html = renderOverviewTab();
  else if(state.activeTab==='settings') html = renderSettingsTab();
  else if(state.activeTab==='schedule') html = renderScheduleTab();
  else if(MODULES[state.activeTab]) html = renderModuleTab(state.activeTab);
  el.innerHTML = html;

  if(MODULES[state.activeTab]) wireModuleTabEvents(state.activeTab);
  renderTabs();
}

function goTab(key){
  state.activeTab = key;
  renderContent();
  window.scrollTo({top:0, behavior:'smooth'});
}

/* ============ Expose global app API for inline handlers ============ */
window.app = {
  goTab, openCreate, openEdit, openDetail, saveForm, confirmDelete, doDelete, closeModal,
  openImport, switchImportSheet, confirmImport, exportModuleExcel,
  cancelImportDuplicate, resolveImportDuplicate,
  toggleRowSelect, toggleSelectAllRows, confirmBatchDelete, doBatchDelete,
  openListManager, addListItem, removeListItem, saveListManager,
  setRepairsView, clearStatsRange, updateRepairItemsCalc, applyRepairItemsTotal,
  clearListRange, exportStatsPPT, enforceCheckboxLimit,
  cancelRepairDuplicate, confirmRepairDuplicateProceed,
  openRepairItemCatalogManager, addRepairItemCatalog, removeRepairItemCatalog, saveRepairItemCatalog,
  quickSetStatus, openRepairItemStations, openRepairItemStationsByIndex,
  setPageSize, goToPage
};

/* ============ Init ============ */
async function init(){
  renderTabs();
  document.getElementById('content').innerHTML = `<div class="empty-state"><span class="emoji">⏳</span>載入資料中…</div>`;
  wireImportInput();
  await loadAll();
  renderContent();
}
document.addEventListener('DOMContentLoaded', init);

</script>
</body>
</html>
